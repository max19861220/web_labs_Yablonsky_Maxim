<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lab 22</title>
    <style>
        /* мінімальні стилі лише для видимості */
        .product-card { border:1px solid #ccc; padding:10px; margin:10px 0; }
        .filter-form { margin:20px 0; }
        .filter-form label { margin-right:10px; }
    </style>
</head>
<body>
    <h1>Каталог продуктів</h1>

    <!-- Форма фільтрації -->
    <div class="filter-form">
        <label>Категорія:
            <select id="categoryFilter">
                <option value="">Всі</option>
                <option value="smartphones">Смартфони</option>
                <option value="laptops">Ноутбуки</option>
                <option value="fragrances">Аромати</option>
            </select>
        </label>
        <label>Пошук:
            <input type="text" id="searchInput" placeholder="Пошук...">
        </label>
        <label>Сортування:
            <select id="sortSelect">
                <option value="price_asc">Ціна (зростання)</option>
                <option value="price_desc">Ціна (спадання)</option>
                <option value="id_desc">Новизна (спочатку нові)</option>
                <option value="id_asc">Новизна (спочатку старі)</option>
            </select>
        </label>
    </div>

    <!-- Контейнер карток -->
    <div id="productList"></div>

    <script>
        // ===== Робота з даними =====
        function loadProducts() {
            const data = localStorage.getItem('products');
            if (data) return JSON.parse(data);
            // Якщо немає даних – створимо тестові
            const testProducts = [
                { id: 1, title: 'iPhone 9', description: 'An apple mobile', price: 549, category: 'smartphones', thumbnail: 'https://via.placeholder.com/100' },
                { id: 2, title: 'Samsung Galaxy S21', description: 'Latest Samsung', price: 799, category: 'smartphones', thumbnail: 'https://via.placeholder.com/100' },
                { id: 3, title: 'MacBook Pro', description: 'Apple laptop', price: 1999, category: 'laptops', thumbnail: 'https://via.placeholder.com/100' },
                { id: 4, title: 'Perfume Chanel', description: 'Luxury fragrance', price: 120, category: 'fragrances', thumbnail: 'https://via.placeholder.com/100' }
            ];
            // Збережемо їх у localStorage для наступних запусків
            localStorage.setItem('products', JSON.stringify(testProducts));
            return testProducts;
        }

        // ===== Рендеринг з фільтрацією, пошуком, сортуванням =====
        function renderProducts() {
            const products = loadProducts();
            const category = document.getElementById('categoryFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const sort = document.getElementById('sortSelect').value;

            // Фільтрація за категорією
            let filtered = products;
            if (category) {
                filtered = filtered.filter(p => p.category === category);
            }

            // Пошук (case-insensitive) у назві та описі
            if (searchTerm) {
                filtered = filtered.filter(p => 
                    p.title.toLowerCase().includes(searchTerm) || 
                    (p.description && p.description.toLowerCase().includes(searchTerm))
                );
            }

            // Сортування
            switch (sort) {
                case 'price_asc':
                    filtered.sort((a, b) => a.price - b.price);
                    break;
                case 'price_desc':
                    filtered.sort((a, b) => b.price - a.price);
                    break;
                case 'id_asc':
                    filtered.sort((a, b) => a.id - b.id);
                    break;
                case 'id_desc':
                    filtered.sort((a, b) => b.id - a.id);
                    break;
            }

            // Відображення карток
            const container = document.getElementById('productList');
            if (filtered.length === 0) {
                container.innerHTML = '<p>Немає продуктів за вибраними критеріями</p>';
                return;
            }
            let html = '';
            filtered.forEach(p => {
                html += `<div class="product-card">
                    <strong>${p.title}</strong><br>
                    Ціна: ${p.price} грн<br>
                    Категорія: ${p.category}<br>
                    Опис: ${p.description || ''}<br>
                    <img src="${p.thumbnail || 'https://via.placeholder.com/100'}" alt="${p.title}" style="max-width:100px;"><br>
                </div>`;
            });
            container.innerHTML = html;
        }

        // ===== Обробники подій =====
        document.getElementById('categoryFilter').addEventListener('change', renderProducts);
        document.getElementById('searchInput').addEventListener('input', renderProducts);
        document.getElementById('sortSelect').addEventListener('change', renderProducts);

        // ===== Початковий рендеринг =====
        renderProducts();
    </script>
</body>
</html>

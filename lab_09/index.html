<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота 9 - Чат</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            padding: 30px;
            margin: 0;
        }

        .chat-container {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: grid;
            gap: 10px;
            align-items: end;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-info {
            display: flex;
            gap: 10px;
            font-size: 14px;
        }

        .user-name { font-weight: bold; color: #333; }
        .msg-time { color: #888; }

        .msg-text {
            padding: 15px 20px;
            font-size: 16px;
            display: flex;
            align-items: center;
            line-height: 1.4;
        }

        .msg-left { grid-template-columns: auto 1fr; }
        .msg-left .user-info { grid-column: 1 / span 2; grid-row: 1; }
        .msg-left .avatar { grid-column: 1; grid-row: 2; }
        .msg-left .msg-text {
            grid-column: 2; grid-row: 2;
            background-color: #ffb3c1; color: #212529;
            border-radius: 20px 20px 20px 0px;
        }

        .msg-right { grid-template-columns: 1fr auto; }
        .msg-right .user-info { grid-column: 1 / span 2; grid-row: 1; justify-content: flex-end; }
        .msg-right .avatar { grid-column: 2; grid-row: 2; }
        .msg-right .msg-text {
            grid-column: 1; grid-row: 2;
            background-color: #a8dadc; color: #212529;
            border-radius: 20px 20px 0px 20px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="message msg-left">
        <div class="user-info">
            <span class="user-name">Anie Smith</span>
            <span class="msg-time">4 hours ago</span>
        </div>
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop" alt="Anie" class="avatar">
        <div class="msg-text">Harum maiores quibusdam rerum, labore repellendus alias?</div>
    </div>
    
    <div class="message msg-right">
        <div class="user-info">
            <span class="user-name">Jack Silverstone</span>
            <span class="msg-time">4 hours ago</span>
        </div>
        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop" alt="Jack" class="avatar">
        <div class="msg-text">Vero, laborum nesciunt itaque eum quis iusto.</div>
    </div>
    
    <div class="message msg-left">
        <div class="user-info">
            <span class="user-name">Anie Smith</span>
            <span class="msg-time">3 hours ago</span>
        </div>
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop" alt="Anie" class="avatar">
        <div class="msg-text">Leiciendis nesciunt earum sapiente ipsam deleniti, vitae veritatis.</div>
    </div>
</div>

</body>
</html>
